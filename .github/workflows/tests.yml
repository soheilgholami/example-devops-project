name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: copy your repo onto the machine
      - uses: actions/checkout@v6

      # Step 2: install Python 3.13 (with pip caching for speed)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      # Step 3: install your dependencies
      - run: pip install -r requirements.txt

      # Step 4: run the tests (-v = verbose, shows each test name)
      - run: pytest -v